apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: sample-app }
  template:
    metadata:
      labels: { app: sample-app }
    spec:
      containers:
        - name: app
          image: app   # tag set by overlays
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: sample-app-config }
            - secretRef: { name: sample-app-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
